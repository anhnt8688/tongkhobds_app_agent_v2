name: mobile_app_v2
description: "TongkhoBDS Agent — Flutter mobile app."
publish_to: 'none'

version: 1.3.9+48

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management / DI
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Routing
  go_router: ^14.6.2

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Models / serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Sharing
  share_plus: ^10.1.4

  # Map (BĐS trên bản đồ) — requires a Google Maps API key in the native config.
  google_maps_flutter: ^2.9.0

  # Current-location detection (bảng hàng default + map center) + reverse geocode
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Contracts: HTML render, signature pad, open attachments
  flutter_widget_from_html: ^0.16.0
  signature: ^5.5.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.1.0

  # Profile menu icons + notification permission toggle
  font_awesome_flutter: ^10.7.0
  permission_handler: ^11.3.1

  # Push notifications (FCM) + local display + deep-link routing (v1 parity)
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.6
  flutter_local_notifications: ^18.0.1

  # Referral QR code + camera scan + save QR to gallery
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # KYC: live CCCD camera capture + crop (QR decode reuses mobile_scanner,
  # which wraps the native GoogleMLKit barcode engine)
  camera: ^0.11.0+2
  image: ^4.3.0
  gal: ^2.3.2
  local_auth: ^2.3.0
  path_provider: ^2.1.5
  device_info_plus: ^11.5.0
  webview_flutter: ^4.10.0

  # in-app document viewer (contract library PDFs)
  syncfusion_flutter_pdfviewer: ^30.1.38

  # Đăng tin: rich-text description, file/video attachments
  flutter_quill: ^11.0.0
  vsc_quill_delta_to_html: ^1.0.5
  flutter_quill_delta_from_html: ^1.0.1
  file_picker: ^8.1.6

  # Đăng bán: build temp image files to share
  path: ^1.9.0

  # i18n / formatting
  intl: ^0.20.2
  flutter_slidable: ^4.0.3

  # Nhắn tin (chat): RocketChat realtime — DDP WebSocket + flutter_chat_ui (v1 parity)
  flutter_chat_ui: ^2.7.0
  flutter_chat_core: ^2.4.0
  flyer_chat_image_message: ^2.3.0
  flyer_chat_file_message: ^2.4.0
  web_socket_channel: ^3.0.3
  uuid: ^4.5.1

  # OTP pin input (v1 parity)
  pinput: ^5.0.1
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.9.0

  # App launcher icon generator (same source logo as v1)
  flutter_launcher_icons: ^0.14.3

# App launcher icon — generated from the v1 logo for both platforms.
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/logo_app.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
  # SF Pro Text bundled so v2 renders identical to v1 on both platforms
  # (weights map to v1's SF-Pro-Display-{Regular,Medium,Semibold,Bold}).
  fonts:
    - family: SF Pro Text
      fonts:
        - asset: assets/fonts/SFProText-Regular.ttf
          weight: 400
        - asset: assets/fonts/SFProText-Medium.ttf
          weight: 500
        - asset: assets/fonts/SFProText-Semibold.ttf
          weight: 600
        - asset: assets/fonts/SFProText-Bold.ttf
          weight: 700
